name: Build & Package UMIS local Distribution

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v1.0.0, v2.1.3, etc.

permissions:
  contents: write # Required to publish releases

jobs:
  build-release:
    name: Build & Obfuscate Wheel
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Monorepo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js for Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'src/frontend/package-lock.json'

      # 3. Build Next.js Static Assets
      - name: Compile Frontend Static Assets
        run: |
          cd src/frontend
          npm ci
          npm run build

      # 4. Setup Python for Backend
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 5. Integrate Pre-compiled Frontend into Backend Static Staging
      - name: Integrate Frontend Statically in Django
        run: |
          mkdir -p src/backend/core/templates
          mkdir -p src/backend/core/static
          cp src/frontend/out/index.html src/backend/core/templates/index.html
          cp -r src/frontend/out/* src/backend/core/static/

      # 6. Install Packaging Utilities
      - name: Install Wheel Builders
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      # 7. Compile Python Code to .pyc and Package Wheel (.whl)
      - name: Compile and Build Python Wheel
        run: |
          cd src/backend
          python setup.py bdist_wheel

      # 8. Create GitHub Release and Upload Distribution Asset
      - name: Release Compiled Wheel Package
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: UMIS Healthcare Release ${{ github.ref_name }}
          body: |
            ## Upemba Medical Information System (UMIS) Local Offline Distribution
            
            This release contains the compiled, secure local offline distribution package for the Medical Department of Upemba National Park.
            
            ### Installation Instructions:
            1. Download the `.whl` package file attached below.
            2. Open a terminal and run the pip installation command:
               ```bash
               pip install umis-1.0.0-py3-none-any.whl
               ```
            3. Launch the local offline server:
               ```bash
               umis-start
               ```
               *This will dynamically configure the database directory `~/.umis/db.sqlite3`, execute migrations, and automatically redirect your browser to the local medical dashboard portal.*
          files: |
            src/backend/dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
